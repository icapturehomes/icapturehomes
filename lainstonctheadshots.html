  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --gold: #c8a96e; --bg: #0a0a0a; --bg-mid: #0d0d0d;
      --text: #f0ede6; --text-muted: rgba(240,237,230,0.55);
      --text-dim: rgba(240,237,230,0.3); --border: rgba(240,237,230,0.08);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; cursor: none; }
    .cursor { position:fixed; width:8px; height:8px; background:var(--gold); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); transition:width 0.2s,height 0.2s; }
    .cursor-ring { position:fixed; width:32px; height:32px; border:1px solid rgba(200,169,110,0.4); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); }
    header {
      display:flex; align-items:center; justify-content:space-between;
      padding:24px 48px; border-bottom:0.5px solid var(--border);
      position:sticky; top:0; background:rgba(10,10,10,0.95);
      backdrop-filter:blur(16px); z-index:100;
    }
    .logo { font-family:'Playfair Display',serif; font-size:18px; color:var(--text); text-decoration:none; }
    .logo span { color:var(--gold); font-style:italic; }
    .header-right { display:flex; align-items:center; gap:24px; }
    .gallery-title { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-dim); }
    .header-count { font-size:11px; color:var(--text-dim); }
    .back-link { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim); text-decoration:none; transition:color 0.2s; display:flex; align-items:center; gap:6px; }
    .back-link:hover { color:var(--gold); }
    .back-link::before { content:'←'; }
    .gallery-intro {
      padding:48px 48px 32px; border-bottom:0.5px solid var(--border);
      display:flex; align-items:flex-end; justify-content:space-between;
    }
    .gallery-intro h1 { font-family:'Playfair Display',serif; font-size:clamp(28px,4vw,48px); font-weight:500; line-height:1.1; }
    .gallery-intro h1 em { font-style:italic; color:var(--gold); }
    .gallery-meta { text-align:right; }
    .gallery-meta-label { font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-dim); margin-bottom:4px; }
    .gallery-meta-val { font-size:13px; color:var(--text-muted); }
    .gallery-grid {
      display:grid; grid-template-columns:repeat(3,1fr); gap:2px; padding:2px;
    }
    @media(max-width:600px) { .gallery-grid { grid-template-columns:1fr; } }
    .gi { position:relative; aspect-ratio:3/2; overflow:hidden; cursor:zoom-in; background:#111; }
    .gi img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.5s ease; }
    .gi:hover img { transform:scale(1.04); }
    .gi-num { position:absolute; bottom:8px; left:10px; font-size:10px; letter-spacing:0.1em; color:rgba(240,237,230,0.4); font-family:'DM Sans',sans-serif; opacity:0; transition:opacity 0.2s; }
    .gi:hover .gi-num { opacity:1; }
    .lb { display:none; position:fixed; inset:0; z-index:9000; background:rgba(5,5,5,0.98); flex-direction:column; align-items:center; justify-content:center; }
    .lb.open { display:flex; }
    .lb-img-wrap { position:relative; max-width:92vw; max-height:82vh; display:flex; align-items:center; justify-content:center; }
    .lb-img-wrap img { max-width:92vw; max-height:82vh; object-fit:contain; display:block; }
    .lb-close { position:fixed; top:20px; right:24px; background:none; border:none; color:rgba(240,237,230,0.5); font-size:28px; cursor:pointer; z-index:9001; line-height:1; transition:color 0.2s; }
    .lb-close:hover { color:var(--gold); }
    .lb-prev,.lb-next { position:fixed; top:50%; transform:translateY(-50%); background:none; border:none; color:rgba(240,237,230,0.4); font-size:44px; cursor:pointer; z-index:9001; padding:20px; transition:color 0.2s; line-height:1; }
    .lb-prev { left:4px; } .lb-next { right:4px; }
    .lb-prev:hover,.lb-next:hover { color:var(--gold); }
    .lb-meta { margin-top:14px; text-align:center; font-size:11px; color:var(--text-dim); font-family:'DM Sans',sans-serif; letter-spacing:0.08em; }
    footer { padding:32px 48px; border-top:0.5px solid var(--border); display:flex; align-items:center; justify-content:space-between; margin-top:2px; }
    .footer-logo { font-family:'Playfair Display',serif; font-size:14px; color:var(--text-dim); }
    .footer-note { font-size:11px; color:var(--text-dim); letter-spacing:0.05em; }
    @media(max-width:600px) {
      header { padding:16px 20px; }
      .gallery-intro { padding:28px 20px 20px; flex-direction:column; gap:16px; }
      .gallery-meta { text-align:left; }
      footer { padding:24px 20px; flex-direction:column; gap:12px; text-align:center; }
    }
  </style>
</head>

    var cx=0,cy=0,rx=0,ry=0;
    var cur=document.getElementById('cur'),ring=document.getElementById('ring');
    document.addEventListener('mousemove',function(e){cx=e.clientX;cy=e.clientY;cur.style.left=cx+'px';cur.style.top=cy+'px';});
    function animRing(){rx+=(cx-rx)*0.12;ry+=(cy-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing);}
    animRing();
    var imgs = [
    "https://lh3.googleusercontent.com/d/1qDVWTW4YvKEXgANdhBs5iSzYf9XfcYMv",

    "https://lh3.googleusercontent.com/d/1hZbK2YOuGZZat41BUZJ36WgO1IXfYpAA",
    "https://lh3.googleusercontent.com/d/1P5PvChK5w_lIu9HP5DoMurBJSs2N8VF2",
    "https://lh3.googleusercontent.com/d/1uLpjcgKqlVG96gKlLWq_TDEEq6kwtS1c",
    "https://lh3.googleusercontent.com/d/1Q06_TCWPtfJy1iWFFCF1PfUAE856C3_7",
    "https://lh3.googleusercontent.com/d/17ZSLawqK78093nqgc-BZT6TUOtSkuupf",

  ];
    var cur_idx=0;
    var lb=document.getElementById('lb'),lbImg=document.getElementById('lbImg'),lbMeta=document.getElementById('lbMeta');
    function openLB(idx){cur_idx=idx;lbImg.src=imgs[idx];lbMeta.textContent=(idx+1)+' / '+imgs.length;lb.classList.add('open');document.body.style.overflow='hidden';}
    function closeLB(){lb.classList.remove('open');document.body.style.overflow='';}
    function prevImg(){cur_idx=(cur_idx-1+imgs.length)%imgs.length;lbImg.src=imgs[cur_idx];lbMeta.textContent=(cur_idx+1)+' / '+imgs.length;}
    function nextImg(){cur_idx=(cur_idx+1)%imgs.length;lbImg.src=imgs[cur_idx];lbMeta.textContent=(cur_idx+1)+' / '+imgs.length;}
    document.getElementById('lbClose').onclick=closeLB;
    document.getElementById('lbPrev').onclick=prevImg;
    document.getElementById('lbNext').onclick=nextImg;
    lb.addEventListener('click',function(e){if(e.target===lb)closeLB();});
    document.addEventListener('keydown',function(e){if(!lb.classList.contains('open'))return;if(e.key==='Escape')closeLB();if(e.key==='ArrowLeft')prevImg();if(e.key==='ArrowRight')nextImg();});
    var tx=0;
    lb.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
    lb.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40){if(dx<0)nextImg();else prevImg();}},{passive:true});
    document.querySelectorAll('.gi').forEach(function(el){el.addEventListener('click',function(){openLB(parseInt(el.dataset.idx));});});
    document.addEventListener('contextmenu',function(e){e.preventDefault();});
